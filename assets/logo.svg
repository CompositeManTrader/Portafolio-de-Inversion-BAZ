<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" width="300" height="64" role="img" aria-label="Punto Casa de Bolsa">
  <defs>
    <linearGradient id="puntoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9085e9"/>
      <stop offset="55%" stop-color="#6f4bb0"/>
      <stop offset="100%" stop-color="#522D6D"/>
    </linearGradient>
  </defs>

  <!-- Marca: el "punto", con anillo concentrico -->
  <circle cx="30" cy="32" r="21" fill="none" stroke="url(#puntoGrad)" stroke-width="2" opacity="0.55"/>
  <circle cx="30" cy="32" r="13.5" fill="url(#puntoGrad)"/>
  <circle cx="30" cy="32" r="4.6" fill="#0f0f16"/>

  <!-- Wordmark -->
  <text x="68" y="30" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="25" font-weight="680" letter-spacing="5.5" fill="#f4f3f7">PUNTO</text>
  <text x="69.5" y="47.5" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="9.5" font-weight="500" letter-spacing="3.5" fill="#8F9C9D">CASA DE BOLSA</text>

  <!-- Filete de acento -->
  <rect x="69" y="35.5" width="152" height="1.6" fill="url(#puntoGrad)" opacity="0.85"/>
</svg>
